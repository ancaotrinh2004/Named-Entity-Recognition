replicaCount: 1

image:
  repository: ghcr.io/mlflow/mlflow
  tag: v3.1.4
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 5000

minio:
  endpoint: "http://minio.mlops.svc.cluster.local:9000"
  accessKey: minioadmin
  secretKey: minioadmin123
  bucket: mlflow

backend:
  type: sqlite
  path: /mlflow/mlflow.db

artifactRoot: s3://mlflow/artifacts

resources:
  requests:
    memory: "512Mi"
    cpu: "50m"
  limits:
    memory: "1Gi"
    cpu: "250m"

# Thêm vào values.yaml
persistence:
  enabled: true
  size: 1Gi
  storageClass: "standard" # Hoặc storageclass của cluster bạn