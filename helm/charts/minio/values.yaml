replicaCount: 1

image:
  repository: quay.io/minio/minio
  tag: latest
  pullPolicy: IfNotPresent

auth:
  rootUser: minioadmin
  rootPassword: minioadmin123

service:
  type: LoadBalancer
  apiPort: 9000
  consolePort: 9001

persistence:
  enabled: true
  size: 50Gi
  storageClass: "standard"

resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

buckets:
  - mlflow
  - models