apiVersion: apps/v1
kind: Deployment
metadata:
  name: phobert-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: phobert-backend
    version: "{{ .Chart.AppVersion }}"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: phobert-backend
  template:
    metadata:
      labels:
        app: phobert-backend
        version: "{{ .Chart.AppVersion }}"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http

          env:
            # ── Non-secret env vars từ values.yaml ──
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}

            # ── VALID_API_KEYS từ K8s Secret — không hardcode trong values.yaml ──
            - name: VALID_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeysSecret.name }}
                  key: {{ .Values.apiKeysSecret.key }}

          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            {{- toYaml .Values.healthCheck.livenessProbe | nindent 12 }}

          readinessProbe:
            {{- toYaml .Values.healthCheck.readinessProbe | nindent 12 }}
          {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - phobert-backend
                topologyKey: kubernetes.io/hostname