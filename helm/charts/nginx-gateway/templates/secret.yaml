apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: ingress-nginx
type: Opaque
stringData:
  # Format: một key mỗi dòng
  # NGINX sẽ check header "X-API-Key" khớp với bất kỳ value nào ở đây
  valid-keys: |
    {{- range $name, $value := .Values.apiKeys }}
    {{ $value }}
    {{- end }}
  # Map key → tên client (dùng cho logging)
  key-map: |
    {{- range $name, $value := .Values.apiKeys }}
    {{ $value }}={{ $name }}
    {{- end }}